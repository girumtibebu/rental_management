# Nginx reverse-proxy configuration for Frappe/ERPNext.
# This file is processed by the nginx "envsubst" templates mechanism;
# ${VARIABLE} placeholders are replaced at container start-up.

upstream frappe_backend {
    server ${FRAPPE_BACKEND};
}

upstream frappe_socketio {
    server ${FRAPPE_SOCKETIO};
}

server {
    listen 80;
    server_name ${SITE_NAME};

    # Allow large file uploads (e.g. document attachments)
    client_max_body_size 50m;

    # Proxy timeouts
    proxy_read_timeout    120s;
    proxy_connect_timeout 30s;

    # ── Socket.IO ─────────────────────────────────────────────
    location /socket.io/ {
        proxy_pass         http://frappe_socketio;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   Host       $host;
    }

    # ── Static assets served directly from the sites volume ───
    location /assets/ {
        alias /home/frappe/frappe-bench/sites/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /files/ {
        alias /home/frappe/frappe-bench/sites/${SITE_NAME}/public/files/;
    }

    # ── All other requests → Frappe gunicorn ──────────────────
    location / {
        proxy_pass         http://frappe_backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
    }
}
